{% extends 'base.html' %}

{% block title %}Create Articles{% endblock %}

{% block content %}
{% if error_message %}
	<p class="text-red-500">{{ error_message }}</p>
{% endif %}
<h2 class="text-2xl font-semibold mb-2">Create Article</h2>
<form method="post" action="/articles/create" class="space-y-4">
	{% csrf_token %} <input type="text" name="title" placeholder="Title" class="w-full p-2 border border-gray-300 rounded">
	<textarea name="content" placeholder="Content" class="w-full p-2 border border-gray-300 rounded"></textarea>
	<button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Create Article</button>
</form>
{% endblock %}
